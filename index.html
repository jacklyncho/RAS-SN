<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Response-Adapted Surgery SMS Calculator</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<h1>Response-Adapted Surgery in Sinonasal Malignancy</h1>

<div class="summary-bar">
<div class="total-box">
Surgical Morbidity Score: <span id="totalProposed">0</span>
</div>
</div>

<div class="grid">

<div class="supersection">Structures Resected</div>

<div class="card">
<div class="card-title">Skull Base</div>

<div class="option-row">
<label>
<span class="option-text">Not required (0)</span>
<span class="option-input"><input type="radio" name="sb-p" value="0"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Anterior skull base bone (1)</span>
<span class="option-input"><input type="radio" name="sb-p" value="1"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Dura (2)</span>
<span class="option-input"><input type="radio" name="sb-p" value="2"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Brain (3)</span>
<span class="option-input"><input type="radio" name="sb-p" value="3"></span>
</label>
</div>
</div>


<div class="card">
<div class="card-title">Orbit</div>

<div class="option-row">
<label>
<span class="option-text">Not required (0)</span>
<span class="option-input"><input type="radio" name="or-p" value="0"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Medial wall resection (1)</span>
<span class="option-input"><input type="radio" name="or-p" value="1"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Periorbital / extraconal fat (2)</span>
<span class="option-input"><input type="radio" name="or-p" value="2"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Orbital exenteration (6)</span>
<span class="option-input"><input type="radio" name="or-p" value="6"></span>
</label>
</div>
</div>


<div class="card">
<div class="card-title">Maxilla</div>

<div class="option-row">
<label>
<span class="option-text">Not required (0)</span>
<span class="option-input"><input type="radio" name="mx-p" value="0"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Medial maxillectomy (1)</span>
<span class="option-input"><input type="radio" name="mx-p" value="1"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Inferior maxillectomy – palate unilateral (2)</span>
<span class="option-input"><input type="radio" name="mx-p" value="2"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Inferior maxillectomy – palate bilateral (3)</span>
<span class="option-input"><input type="radio" name="mx-p" value="3"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Major floor of orbit resection (4)</span>
<span class="option-input"><input type="radio" name="mx-p" value="4"></span>
</label>
</div>
</div>


<div class="card">
<div class="card-title">Skin Resection</div>

<div class="option-row">
<label>
<span class="option-text">Not required (0)</span>
<span class="option-input"><input type="radio" name="sk-p" value="0"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Skin of face; cheek/ forehead (2)</span>
<span class="option-input"><input type="radio" name="sk-p" value="2"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Partial rhinectomy (3)</span>
<span class="option-input"><input type="radio" name="sk-p" value="3"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Total rhinectomy (5)</span>
<span class="option-input"><input type="radio" name="sk-p" value="5"></span>
</label>
</div>
</div>


<div class="supersection">Exposure</div>

<div class="card">
<div class="card-title">Facial</div>

<div class="option-row">
<label>
<span class="option-text">Endoscopic resection (0)</span>
<span class="option-input"><input type="radio" name="ef-p" value="0"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Trans-facial incision +/- cheek flap (2)</span>
<span class="option-input"><input type="radio" name="ef-p" value="2"></span>
</label>
</div>
</div>


<div class="card">
<div class="card-title">Cranial</div>

<div class="option-row">
<label>
<span class="option-text">Endoscopic (0)</span>
<span class="option-input"><input type="radio" name="ec-p" value="0"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Bicoronal craniotomy (3)</span>
<span class="option-input"><input type="radio" name="ec-p" value="3"></span>
</label>
</div>
</div>


<div class="supersection">Reconstruction</div>

<div class="card">
<div class="card-title">Regional Flap</div>

<div class="option-row">
<label>
<span class="option-text">Not required (0)</span>
<span class="option-input"><input type="radio" name="rf-p" value="0"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Nasoseptal flap (1)</span>
<span class="option-input"><input type="radio" name="rf-p" value="1"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Pericranial flap (1)</span>
<span class="option-input"><input type="radio" name="rf-p" value="1"></span>
</label>
</div>
</div>


<div class="card">
<div class="card-title">Free Flap</div>

<div class="option-row">
<label>
<span class="option-text">Not required (0)</span>
<span class="option-input"><input type="checkbox" name="ff-p" value="0" data-none="true"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Soft tissue (3)</span>
<span class="option-input"><input type="checkbox" name="ff-p" value="3"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Bone (4)</span>
<span class="option-input"><input type="checkbox" name="ff-p" value="4"></span>
</label>
</div>
</div>


<div class="supersection">Lymph Node Basin Management</div>

<div class="card">
<div class="card-title">Neck Dissection</div>

<div class="option-row">
<label>
<span class="option-text">Not required (0)</span>
<span class="option-input"><input type="radio" name="nd-p" value="0"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Unilateral (1)</span>
<span class="option-input"><input type="radio" name="nd-p" value="1"></span>
</label>
</div>

<div class="option-row">
<label>
<span class="option-text">Bilateral (2)</span>
<span class="option-input"><input type="radio" name="nd-p" value="2"></span>
</label>
</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
